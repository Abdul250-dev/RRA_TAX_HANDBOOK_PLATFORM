server:
  port: 8081

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: taxhandbook
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/rra_tax_hand_book}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:Admin@123}
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
  security:
    user:
      name: admin
      password: Admin@123
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}
security:
  jwt:
    secret: rra-tax-handbook-local-jwt-secret-change-in-production
    expiration-seconds: 3600
app:
  mail:
    from: ${APP_MAIL_FROM:no-reply@rra-tax-handbook.local}
