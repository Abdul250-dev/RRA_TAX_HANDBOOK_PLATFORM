server:
  port: 8081

spring:
  profiles:
    default: dev
  config:
    import: optional:file:.env[.properties]
  application:
    name: taxhandbook
  jpa:
    open-in-view: false
    defer-datasource-initialization: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

security:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-seconds: 3600

app:
  content:
    required-publish-locales: ${APP_CONTENT_REQUIRED_PUBLISH_LOCALES:EN}
  security:
    bootstrap-admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      username: ${BOOTSTRAP_ADMIN_USERNAME:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    initial-admin:
      enabled: ${INITIAL_ADMIN_ENABLED:false}
      employee-id: ${INITIAL_ADMIN_EMPLOYEE_ID:}
      first-name: ${INITIAL_ADMIN_FIRST_NAME:}
      last-name: ${INITIAL_ADMIN_LAST_NAME:}
      email: ${INITIAL_ADMIN_EMAIL:}
      username: ${INITIAL_ADMIN_USERNAME:}
      password: ${INITIAL_ADMIN_PASSWORD:}
      preferred-locale: ${INITIAL_ADMIN_PREFERRED_LOCALE:EN}
    expose-sensitive-tokens: ${APP_SECURITY_EXPOSE_SENSITIVE_TOKENS:false}
    rate-limit:
      enabled: ${APP_SECURITY_RATE_LIMIT_ENABLED:true}
      max-requests: ${APP_SECURITY_RATE_LIMIT_MAX_REQUESTS:5}
      window-seconds: ${APP_SECURITY_RATE_LIMIT_WINDOW_SECONDS:60}
  mail:
    from: ${APP_MAIL_FROM:no-reply@rra-tax-handbook.local}
    invite-accept-url: ${APP_MAIL_INVITE_ACCEPT_URL:http://localhost:3000/accept-invite?token={token}}
    reset-password-url: ${APP_MAIL_RESET_PASSWORD_URL:http://localhost:3000/reset-password?token={token}}
    delivery:
      max-attempts: ${APP_MAIL_DELIVERY_MAX_ATTEMPTS:3}
      retry-delay-ms: ${APP_MAIL_DELIVERY_RETRY_DELAY_MS:250}
    queue:
      max-attempts: ${APP_MAIL_QUEUE_MAX_ATTEMPTS:10}
      retry-delay-seconds: ${APP_MAIL_QUEUE_RETRY_DELAY_SECONDS:300}
      processing:
        enabled: ${APP_MAIL_QUEUE_PROCESSING_ENABLED:true}
        fixed-delay-ms: ${APP_MAIL_QUEUE_PROCESSING_FIXED_DELAY_MS:60000}
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:3001
      - http://localhost:5173
